<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>book management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        #alertBox { display: none; }
    </style>
</head>
<body>
<div class="container mt-4" style="max-width: 900px;">
    <h2 class="mb-4">📚 book management</h2>

    <div id="alertBox" class="alert" role="alert"></div>

    <!-- 등록 / 수정 폼 -->
    <div class="card mb-4">
        <div class="card-header fw-bold" id="formTitle">book registration</div>
        <div class="card-body">
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label for="name" class="form-label">book name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter book name" required>
                    </div>
                    <div class="col-md-4">
                        <label for="author" class="form-label">author</label>
                        <input type="text" class="form-control" id="author" placeholder="Enter author" required>
                    </div>
                    <div class="col-md-3">
                        <label for="price" class="form-label">price (KRW)</label>
                        <input type="number" class="form-control" id="price" placeholder="0" min="0" step="1" required>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary" id="submitBtn">register</button>
                    <button type="button" class="btn btn-secondary ms-2" id="cancelBtn" style="display:none;">cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 도서 목록 -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center fw-bold">
            book list
            <button class="btn btn-sm btn-outline-secondary" onclick="loadBooks()">↺ refresh</button>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th style="width:60px">ID</th>
                        <th>book name</th>
                        <th>author</th>
                        <th style="width:120px">price</th>
                        <th style="width:140px">manage</th>
                    </tr>
                </thead>
                <tbody id="bookList">
                    <tr><td colspan="5" class="text-center text-muted py-3">loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = '/api/books';

    /* ── 유틸 ── */
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str ?? '')));
        return div.innerHTML;
    }

    function showAlert(message, type = 'success') {
        const box = document.getElementById('alertBox');
        box.className = `alert alert-${type}`;
        box.textContent = message;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 3000);
    }

    /* ── 목록 조회 ── */
    async function loadBooks() {
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error(`server error (${res.status})`);
            const books = await res.json();
            renderBooks(books);
        } catch (e) {
            document.getElementById('bookList').innerHTML =
                `<tr><td colspan="5" class="text-center text-danger py-3">${escapeHtml(e.message)}</td></tr>`;
        }
    }

    function renderBooks(books) {
        const tbody = document.getElementById('bookList');
        if (!books || books.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">No books available.</td></tr>';
            return;
        }
        tbody.innerHTML = books.map(b => `
            <tr>
                <td>${escapeHtml(b.id)}</td>
                <td>${escapeHtml(b.name)}</td>
                <td>${escapeHtml(b.author)}</td>
                <td>${Number(b.price).toLocaleString()} KRW</td>
                <td>
                    <button class="btn btn-sm btn-warning me-1" onclick="startEdit(${b.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteBook(${b.id})">Delete</button>
                </td>
            </tr>`).join('');
    }

    /* ── 등록 / 수정 폼 제출 ── */
    document.getElementById('bookForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id    = document.getElementById('bookId').value;
        const book  = {
            name:   document.getElementById('name').value.trim(),
            author: document.getElementById('author').value.trim(),
            price:  parseFloat(document.getElementById('price').value)
        };

        try {
            let res;
            if (id) {
                res = await fetch(`${API}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(book)
                });
            } else {
                res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(book)
                });
            }

            if (!res.ok) throw new Error(`Save failed (${res.status})`);
            showAlert(id ? 'Book updated.' : 'Book registered.');
            resetForm();
            loadBooks();
        } catch (e) {
            showAlert(e.message, 'danger');
        }
    });

    /* ── 수정 시작 ── */
    async function startEdit(id) {
        try {
            const res = await fetch(`${API}/${id}`);
            if (!res.ok) throw new Error(`Fetch failed (${res.status})`);
            const book = await res.json();

            document.getElementById('bookId').value  = book.id;
            document.getElementById('name').value    = book.name;
            document.getElementById('author').value  = book.author;
            document.getElementById('price').value   = book.price;

            document.getElementById('formTitle').textContent     = 'Edit Book';
            document.getElementById('submitBtn').textContent     = 'Update';
            document.getElementById('cancelBtn').style.display   = '';
            document.getElementById('name').focus();
        } catch (e) {
            showAlert(e.message, 'danger');
        }
    }

    /* ── 삭제 ── */
    async function deleteBook(id) {
        if (!confirm(`Are you sure you want to delete book ID ${id}?`)) return;
        try {
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            if (!res.ok) throw new Error(`Delete failed (${res.status})`);
            showAlert('Book deleted.');
            loadBooks();
        } catch (e) {
            showAlert(e.message, 'danger');
        }
    }

    /* ── 폼 초기화 ── */
    document.getElementById('cancelBtn').addEventListener('click', resetForm);

    function resetForm() {
        document.getElementById('bookId').value              = '';
        document.getElementById('bookForm').reset();
        document.getElementById('formTitle').textContent     = 'Register Book';
        document.getElementById('submitBtn').textContent     = 'Register';
        document.getElementById('cancelBtn').style.display   = 'none';
    }

    /* ── 초기 로딩 ── */
    loadBooks();
</script>
</body>
</html>
